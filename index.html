<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rixa | Pedidos Diamante</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
        :root { --primary: #FF6600; --dark: #222; --light: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 80px; }
        header { background: var(--dark); color: white; padding: 20px; text-align: center; }
        .nav-cats { display: flex; overflow-x: auto; padding: 10px; gap: 10px; background: white; }
        .cat-btn { background: #eee; padding: 10px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; border: none; }
        .store-card { background: white; margin: 15px; padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
        button { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 5px; font-weight: bold; }
        .floating-cart { position: fixed; bottom: 0; width: 100%; background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header><h1>Rixa</h1></header>

<div class="nav-cats">
    <button class="cat-btn" onclick="filtrar('Todo')">Todos</button>
    <button class="cat-btn" onclick="filtrar('Farmacia')">💊 Farmacias</button>
    <button class="cat-btn" onclick="filtrar('Kiosco')">🍬 Kioscos</button>
    <button class="cat-btn" onclick="filtrar('Comida')">🍕 Comidas</button>
</div>

<div id="app"></div>

<div class="floating-cart" id="checkout-btn">🛒 Pagar Carrito ($<span id="total">0</span>)</div>

<script>
    const mp = new MercadoPago('APP_USR-4fdd2fd5-429a-44d7-9921-d0ae4de0b8d0', { locale: 'es-AR' });
    let carrito = [];
    let total = 0;

    const data = [
        { nombre: 'Farmacia Centro', cat: 'Farmacia', productos: [{ n: 'Ibuprofeno', p: 1500 }, { n: 'Paracetamol', p: 1200 }] },
        { nombre: 'Kiosco El Pana', cat: 'Kiosco', productos: [{ n: 'Coca Cola', p: 2500 }, { n: 'Alfajor', p: 800 }] },
        { nombre: 'Pizzeria Don Pedro', cat: 'Comida', productos: [{ n: 'Pizza Muzzarella', p: 6000 }, { n: 'Empanada', p: 900 }] }
    ];

    function render(filtro = 'Todo') {
        const app = document.getElementById('app');
        app.innerHTML = '';
        data.filter(s => filtro === 'Todo' || s.cat === filtro).forEach(store => {
            let html = `<div class="store-card"><h3>${store.nombre}</h3>`;
            store.productos.forEach(prod => {
                html += `<div class="product"><span>${prod.n} - $${prod.p}</span><button onclick="add('${prod.n}', ${prod.p})">+</button></div>`;
            });
            app.innerHTML += html + `</div>`;
        });
    }

    function add(n, p) {
        carrito.push({ title: n, quantity: 1, unit_price: p });
        total += p;
        document.getElementById('total').innerText = total;
        alert(n + " agregado");
    }

    document.getElementById('checkout-btn').onclick = async () => {
        if (carrito.length === 0) return alert("Carrito vacío");
        const res = await fetch('https://rixa-backend-production.up.railway.app/crear-preferencia', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ items: carrito })
        });
        const d = await res.json();
        window.location.href = `https://www.mercadopago.com.ar/checkout/v1/redirect?pref_id=${d.id}`;
    };

    render();
    function filtrar(c) { render(c); }
</script>
</body>
</html>
